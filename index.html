<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <title>Report Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root,
        [data-theme="light"] {
            --bg-page:#f0e8d8;
            --bg-panel:#fdf8f0;
            --bg-card:#f7f1e6;
            --bg-input:#fdf8f0;
            --border:#d4c4a8;
            --border-hi:#b8a488;
            --accent:#1864c4;
            --accent-glow:rgba(24,100,196,0.15);
            --gold:#9a6800;
            --text-pri:#2a1f0e;
            --text-sec:#5a4a30;
            --text-muted:#9a8868;
            --success:#0a7a58;
            --danger:#c02236;
            --warning:#a85800;
            --grid-ln:rgba(154,104,0,0.06);
            --shadow:0 2px 10px rgba(0,0,0,0.08);
            --hdr-bg:linear-gradient(135deg,#15387a 0%,#1a4c96 100%);
            --panel-hdr-bg:linear-gradient(90deg,#ede3d0,transparent);
            --drop-bg:#f7f1e4;
            --snag-img-bg:#ede3d0;
            --mono:'Share Tech Mono', monospace;
            --ui:'Rajdhani', sans-serif;
        }

        [data-theme="dark"] {
            --bg-page:#060e1f;
            --bg-panel:#0d1b2e;
            --bg-card:#111f35;
            --bg-input:#0a1628;
            --border:#1e3a5f;
            --border-hi:#2a5080;
            --accent:#2196f3;
            --accent-glow:rgba(33,150,243,0.28);
            --gold:#f0c040;
            --text-pri:#d0e4f7;
            --text-sec:#7a9ec0;
            --text-muted:#3d6080;
            --success:#00c896;
            --danger:#f04060;
            --warning:#f0a020;
            --grid-ln:rgba(33,150,243,0.05);
            --shadow:0 4px 20px rgba(0,0,0,0.4);
            --hdr-bg:linear-gradient(135deg,#0a1628 0%,#0d1f3a 100%);
            --panel-hdr-bg:linear-gradient(90deg,#111f35,transparent);
            --drop-bg:#0a1628;
            --snag-img-bg:#080f1a;
        }

        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            font-family:var(--ui);
            background:var(--bg-page);
            color:var(--text-pri);
            min-height:100vh;
            background-image:
                linear-gradient(var(--grid-ln) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-ln) 1px, transparent 1px);
            background-size:40px 40px;
            transition:background-color .3s,color .3s;
        }

        .app-header {
            background:var(--hdr-bg);
            padding:0 24px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            height:62px;
            position:sticky;
            top:0;
            z-index:100;
            box-shadow:0 3px 18px rgba(0,0,0,0.28);
        }
        .app-header::after {
            content:'';
            position:absolute;
            bottom:0;
            left:0;
            right:0;
            height:2px;
            background:linear-gradient(90deg,transparent,var(--accent),#f0c040,var(--accent),transparent);
            opacity:.85;
        }
        .header-brand { display:flex; align-items:center; gap:12px; }
        .header-icon {
            width:36px;
            height:36px;
            background:rgba(255,255,255,0.13);
            border:1px solid rgba(255,255,255,0.22);
            border-radius:7px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
        }
        .header-title {
            font-size:1.2em;
            font-weight:700;
            letter-spacing:2px;
            text-transform:uppercase;
            color:#fff;
        }
        .header-title span { color:#82c8f8; }
        .header-right, .header-actions { display:flex; align-items:center; gap:9px; }
        .header-actions { gap:6px; }

        .theme-pill {
            display:flex;
            align-items:center;
            gap:7px;
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.18);
            border-radius:22px;
            padding:5px 11px 5px 7px;
            cursor:pointer;
            transition:background .2s;
            user-select:none;
        }
        .theme-pill:hover { background:rgba(255,255,255,0.2); }
        .tp-track {
            width:34px;
            height:18px;
            background:rgba(255,255,255,0.2);
            border-radius:9px;
            position:relative;
            transition:background .3s;
            flex-shrink:0;
        }
        [data-theme="dark"] .tp-track { background:#2196f3; }
        .tp-thumb {
            width:14px;
            height:14px;
            background:#fff;
            border-radius:50%;
            position:absolute;
            top:2px;
            left:2px;
            transition:transform .3s cubic-bezier(.34,1.56,.64,1);
            box-shadow:0 1px 4px rgba(0,0,0,0.3);
        }
        [data-theme="dark"] .tp-thumb { transform:translateX(16px); }
        .tp-icon { font-size:.95em; line-height:1; }
        .tp-label {
            font-family:var(--mono);
            font-size:.68em;
            color:rgba(255,255,255,0.75);
            letter-spacing:1px;
            text-transform:uppercase;
            white-space:nowrap;
        }

        .btn-hdr {
            font-family:var(--ui);
            font-weight:600;
            font-size:.82em;
            letter-spacing:.7px;
            text-transform:uppercase;
            padding:7px 13px;
            border-radius:5px;
            cursor:pointer;
            background:rgba(255,255,255,0.1);
            color:#fff;
            border:1px solid rgba(255,255,255,0.2);
            display:inline-flex;
            align-items:center;
            gap:5px;
            white-space:nowrap;
            transition:all .2s;
        }
        .btn-hdr:hover { background:rgba(255,255,255,0.22); border-color:rgba(255,255,255,0.35); }

        .main-layout {
            max-width:1100px;
            margin:0 auto;
            padding:22px 18px;
            display:flex;
            flex-direction:column;
            gap:16px;
        }
        .panel {
            background:var(--bg-panel);
            border:1px solid var(--border);
            border-radius:8px;
            overflow:hidden;
            box-shadow:var(--shadow);
            transition:background .3s,border-color .3s;
        }
        .panel-hdr {
            background:var(--panel-hdr-bg);
            border-bottom:1px solid var(--border);
            padding:10px 18px;
            display:flex;
            align-items:center;
            gap:9px;
        }
        .phdr-dot {
            width:7px;
            height:7px;
            border-radius:50%;
            background:var(--accent);
            box-shadow:0 0 6px var(--accent-glow);
            flex-shrink:0;
        }
        .panel-ttl {
            font-family:var(--mono);
            font-size:.76em;
            letter-spacing:2px;
            text-transform:uppercase;
            color:var(--accent);
        }
        .panel-body { padding:18px; }

        .panel-hdr.collapsible { cursor:pointer; user-select:none; }
        .panel-hdr.collapsible:hover .panel-ttl { color:var(--gold); }
        .collapse-chevron {
            margin-left:auto;
            font-size:.8em;
            color:var(--text-muted);
            transition:transform .25s ease;
            flex-shrink:0;
        }
        .panel.collapsed .collapse-chevron { transform:rotate(-90deg); }
        .panel.collapsed .panel-body { display:none; }
        .panel.collapsed .panel-hdr { border-bottom:none; }

        .g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:13px; }
        .g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:13px; }
        .fg { display:flex; flex-direction:column; gap:5px; }
        label {
            font-family:var(--mono);
            font-size:.69em;
            letter-spacing:1.5px;
            text-transform:uppercase;
            color:var(--text-sec);
        }
        input[type="text"], input[type="date"], select, textarea {
            background:var(--bg-input);
            border:1px solid var(--border);
            border-radius:5px;
            color:var(--text-pri);
            font-family:var(--ui);
            font-size:.94em;
            font-weight:500;
            padding:9px 12px;
            width:100%;
            outline:none;
            transition:border-color .2s,box-shadow .2s,background .3s;
            -webkit-appearance:none;
        }
        input:focus, select:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
        textarea { resize:vertical; min-height:150px; line-height:1.55; }

        .btn {
            font-family:var(--ui);
            font-weight:700;
            font-size:.86em;
            letter-spacing:.7px;
            text-transform:uppercase;
            padding:9px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            transition:all .2s;
            display:inline-flex;
            align-items:center;
            gap:6px;
            white-space:nowrap;
        }
        .btn-gold { background:var(--gold); color:#fff; }
        .btn-gold:hover { filter:brightness(1.1); }
        .btn-ghost { background:transparent; color:var(--text-sec); border:1px solid var(--border); }
        .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
        .btn-danger { background:transparent; color:var(--danger); border:1px solid rgba(192,34,54,0.35); }
        .btn-danger:hover { background:rgba(192,34,54,0.07); }
        .btn-edit { background:transparent; color:var(--warning); border:1px solid rgba(168,88,0,0.35); }
        .btn-edit:hover { background:rgba(168,88,0,0.07); }
        .btn-success { background:transparent; color:var(--success); border:1px solid rgba(10,122,88,0.35); }
        .btn-success:hover { background:rgba(10,122,88,0.07); }
        .btn-markup { background:transparent; color:#7c5abf; border:1px solid rgba(124,90,191,0.35); }
        [data-theme="dark"] .btn-markup { color:#a78bfa; border-color:rgba(167,139,250,0.3); }
        .btn-markup:hover { background:rgba(124,90,191,0.08); }
        .btn-full { width:100%; justify-content:center; padding:12px; font-size:.94em; }

        .dash-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .dash-card {
            background:var(--bg-card);
            border:1px solid var(--border);
            border-radius:6px;
            padding:13px 16px;
            text-align:center;
            transition:background .3s,border-color .3s;
        }
        .dash-val {
            font-family:var(--mono);
            font-size:1.9em;
            font-weight:700;
            display:block;
            line-height:1;
            margin-bottom:4px;
            color:var(--accent);
        }
        .dash-lbl {
            font-family:var(--mono);
            font-size:.66em;
            letter-spacing:1.5px;
            text-transform:uppercase;
            color:var(--text-muted);
        }

        .filter-bar {
            display:flex;
            gap:10px;
            align-items:center;
            padding:12px 16px;
            background:var(--bg-panel);
            border-radius:8px;
            border:1px solid var(--border);
            box-shadow:var(--shadow);
            transition:background .3s;
        }
        .filter-bar label { color:var(--text-muted); font-size:.72em; white-space:nowrap; }
        .filter-bar input { background:var(--bg-input); flex:1; }

        .drop-zone {
            border:2px dashed var(--border);
            border-radius:6px;
            padding:16px;
            text-align:center;
            background:var(--drop-bg);
            transition:all .25s;
            margin-bottom:13px;
            display:block;
        }
        .drop-zone.drag-over { border-color:var(--accent); background:var(--accent-glow); }
        .dz-icon { font-size:1.5em; display:block; margin-bottom:5px; }
        .dz-text { font-size:.87em; color:var(--text-sec); display:block; }
        .dz-sub { font-size:.74em; color:var(--text-muted); display:block; margin-top:3px; margin-bottom:10px; }
        .upload-methods { display:grid; grid-template-columns:1fr 1fr; gap:8px; position:relative; z-index:5; width:100%; }
        .upload-methods label { padding:9px 10px; font-size:.88em; cursor:pointer; margin:0; text-align:center; justify-content:center; }

        .desc-wrap { position:relative; margin-bottom:15px; }
        .desc-wrap textarea { padding-right:58px; }
        .desc-actions {
            position:absolute;
            right:60px;
            bottom:10px;
            display:none;
            gap:8px;
        }
        .desc-actions button {
            width:42px;
            height:42px;
            border-radius:50%;
            border:1px solid var(--border-hi);
            background:var(--bg-card);
            color:var(--text-sec);
            font-size:1.1em;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0;
            box-shadow:var(--shadow);
            transition:all .2s;
        }
        .desc-actions button:active { transform:scale(.92); border-color:var(--accent); }
        .desc-actions button svg { display:block; }
        .btn-mic {
            position:absolute;
            right:10px;
            bottom:10px;
            width:42px;
            height:42px;
            border-radius:50%;
            border:none;
            background:var(--accent);
            color:#fff;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0;
            transition:all .2s;
            box-shadow:var(--shadow);
        }
        .btn-mic svg { display:block; }
        .btn-mic:hover { filter:brightness(1.12); }
        .btn-mic:active { transform:scale(.92); }
        .btn-mic.listening {
            background:var(--danger);
            color:#fff;
            animation:micPulse 1.2s infinite;
        }
        @keyframes micPulse {
            0% { box-shadow:0 0 0 0 rgba(192,34,54,0.45); }
            70% { box-shadow:0 0 0 12px rgba(192,34,54,0); }
            100% { box-shadow:0 0 0 0 rgba(192,34,54,0); }
        }

        #markup-container { display:none; margin-bottom:13px; }
        #cropper-wrapper { height:350px; background:#111; margin-bottom:9px; border-radius:5px; overflow:hidden; }
        #image-to-edit { max-width:100%; display:block; }
        #markup-canvas {
            border:1px solid var(--border-hi);
            border-radius:4px;
            max-width:100%;
            touch-action:none;
            cursor:crosshair;
            background:#eee;
            display:block;
        }
        .edit-tb { display:flex; gap:7px; margin-bottom:9px; flex-wrap:wrap; }
        .edit-tb .btn { flex:1; }

        #snag-list { display:flex; flex-direction:column; gap:12px; }
        .snag-item {
            display:flex;
            background:var(--bg-card);
            border:1px solid var(--border);
            border-radius:7px;
            overflow:hidden;
            transition:border-color .2s,background .3s;
            page-break-inside:avoid !important;
            box-shadow:var(--shadow);
        }
        .snag-item:hover { border-color:var(--border-hi); }
        .snag-photo-wrap {
            width:168px;
            min-width:168px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-right:1px solid var(--border);
            background:var(--snag-img-bg);
            flex-shrink:0;
        }
        .snag-photo { max-width:100%; max-height:175px; object-fit:contain; display:block; }
        .no-img {
            color:var(--text-muted);
            font-family:var(--mono);
            font-size:.71em;
            letter-spacing:1px;
            text-align:center;
            padding:20px;
        }
        .snag-body { padding:13px 17px; flex-grow:1; display:flex; flex-direction:column; min-width:0; }
        .snag-top {
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:9px;
            padding-bottom:9px;
            border-bottom:1px solid var(--border);
        }
        .snag-ref { font-family:var(--mono); font-size:1em; color:var(--gold); font-weight:700; letter-spacing:1px; }
        .snag-desc {
            font-size:.94em;
            color:var(--text-pri);
            line-height:1.6;
            flex-grow:1;
            word-wrap:break-word;
            overflow-wrap:break-word;
        }
        .snag-acts { margin-top:11px; display:flex; justify-content:flex-end; gap:7px; }

        .rpt-hdr-block {
            background:var(--bg-panel);
            border:1px solid var(--border);
            border-radius:8px;
            padding:17px 19px;
            margin-bottom:16px;
            box-shadow:var(--shadow);
            transition:background .3s;
        }
        .rpt-title {
            font-size:1.2em;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:2px;
            color:var(--text-pri);
            text-align:center;
            margin-bottom:13px;
        }
        .rpt-meta-row { display:flex; justify-content:space-between; align-items:center; gap:18px; }
        .rpt-meta-text { font-size:.88em; color:var(--text-sec); line-height:1.8; }
        .rpt-meta-text strong { color:var(--text-pri); }
        .rpt-logo img { max-height:58px; max-width:180px; object-fit:contain; }
        .divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:13px 0; }
        .sec-lbl {
            font-family:var(--mono);
            font-size:.69em;
            letter-spacing:2px;
            text-transform:uppercase;
            color:var(--text-muted);
            margin-bottom:9px;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .sec-lbl::after { content:''; flex:1; height:1px; background:var(--border); }
        .description-heading { margin-top:5px; display:flex; justify-content:space-between; align-items:center; }
        #btn-regen { padding:3px 8px; font-size:.85em; margin:0; color:#7c5abf; border-color:rgba(124,90,191,0.35); }

        @media (hover: none), (pointer: coarse) {
            .drop-zone, .photo-lbl { display:none !important; }
            .desc-actions { display:flex !important; }
            .desc-wrap textarea { padding-bottom:64px; }
        }

        @media (max-width:700px) {
            .app-header { padding:10px 11px; height:auto; flex-wrap:wrap; gap:10px; }
            .header-right { width:100%; flex-wrap:wrap; justify-content:flex-end; }
            .theme-pill { margin-right:auto; margin-bottom:8px; }
            .header-actions { width:100%; display:flex; justify-content:space-between; gap:5px; }
            .btn-hdr { flex:1; justify-content:center; padding:8px 2px; font-size:.75em; }
            .tp-label { display:none; }
            .main-layout { padding:11px 10px; }
            .g3, .g4 { grid-template-columns:1fr; }
            .snag-item { flex-direction:column; }
            .snag-photo-wrap { width:100%; min-width:unset; height:155px; border-right:none; border-bottom:1px solid var(--border); }
            #cropper-wrapper { height:250px; }
        }

        @page { size:A4; margin:.75in .4in .5in .4in; }
        .pdf-export-mode {
            width:760px !important;
            max-width:760px !important;
            min-width:760px !important;
            margin:0 !important;
            padding:0 !important;
            background-color:#fff !important;
            color:#222 !important;
            box-sizing:border-box !important;
        }
        .pdf-export-mode .rpt-hdr-block {
            background:#fdf8f0 !important;
            border:1px solid #d4c4a8 !important;
            border-radius:4px !important;
            box-shadow:none !important;
            padding:16px !important;
            margin-top:0 !important;
            margin-bottom:16px !important;
            width:100% !important;
            box-sizing:border-box !important;
        }
        .pdf-export-mode .rpt-title { color:#1a1208 !important; font-size:15px !important; margin-bottom:10px !important; }
        .pdf-export-mode .rpt-meta-text { color:#3a2e1a !important; font-size:11px !important; line-height:1.7 !important; }
        .pdf-export-mode .rpt-meta-text strong { color:#1a1208 !important; }
        .pdf-export-mode .rpt-logo img { max-height:52px !important; filter:none !important; }
        .pdf-export-mode .divider { background:#c8baa0 !important; margin:10px 0 !important; }
        .pdf-export-mode .dash-wrap { display:block !important; width:220px !important; margin-bottom:16px !important; }
        .pdf-export-mode .dash-card { background:#f0ebe0 !important; border:1px solid #c8baa0 !important; border-radius:4px !important; padding:10px 14px !important; }
        .pdf-export-mode .dash-val { color:#1864c4 !important; font-size:20px !important; }
        .pdf-export-mode .dash-lbl { color:#6a5a3a !important; font-size:9px !important; }
        .pdf-export-mode .sec-lbl { color:#6a5a3a !important; font-size:9px !important; margin-bottom:8px !important; }
        .pdf-export-mode .sec-lbl::after { background:#c8baa0 !important; }
        .pdf-export-mode #snag-list { display:block !important; width:100% !important; }
        .pdf-export-mode .snag-item {
            display:table !important;
            width:100% !important;
            table-layout:fixed !important;
            border-collapse:collapse !important;
            background:#fff !important;
            border:1px solid #c8baa0 !important;
            border-radius:4px !important;
            box-shadow:none !important;
            page-break-inside:avoid !important;
            break-inside:avoid !important;
            margin-bottom:10px !important;
            box-sizing:border-box !important;
        }
        .pdf-export-mode .snag-photo-wrap {
            display:table-cell !important;
            width:200px !important;
            vertical-align:middle !important;
            text-align:center !important;
            background:#fdf8f0 !important;
            border-right:1px solid #c8baa0 !important;
            padding:8px !important;
            box-sizing:border-box !important;
            page-break-inside:avoid !important;
            break-inside:avoid !important;
        }
        .pdf-export-mode .snag-photo {
            max-width:100% !important;
            max-height:160px !important;
            width:auto !important;
            height:auto !important;
            object-fit:contain !important;
            display:block !important;
            margin:0 auto !important;
        }
        .pdf-export-mode img { page-break-inside:avoid !important; break-inside:avoid !important; }
        .pdf-export-mode .no-img { color:#9a8868 !important; font-size:9px !important; padding:16px !important; display:block !important; text-align:center !important; }
        .pdf-export-mode .snag-body {
            display:table-cell !important;
            vertical-align:top !important;
            width:auto !important;
            padding:12px 14px !important;
            box-sizing:border-box !important;
            page-break-inside:avoid !important;
            break-inside:avoid !important;
        }
        .pdf-export-mode .snag-top {
            display:block !important;
            border-bottom:1px solid #ddd !important;
            margin-bottom:8px !important;
            padding-bottom:6px !important;
        }
        .pdf-export-mode .snag-ref { color:#9a6800 !important; font-size:13px !important; }
        .pdf-export-mode .snag-desc {
            color:#2a1f0e !important;
            font-size:15px !important;
            line-height:1.55 !important;
            word-wrap:break-word !important;
            overflow-wrap:break-word !important;
            word-break:break-word !important;
            white-space:normal !important;
            display:block !important;
        }
        .pdf-export-mode .no-print { display:none !important; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-brand">
            <div class="header-icon">📋</div>
            <div class="header-title">REPORT <span>GENERATOR</span></div>
        </div>
        <div class="header-right">
            <div class="theme-pill no-print" onclick="toggleTheme()" title="Toggle theme">
                <div class="tp-track"><div class="tp-thumb"></div></div>
                <span class="tp-icon" id="theme-icon">☀️</span>
                <span class="tp-label" id="theme-label">Light</span>
            </div>
            <div class="header-actions no-print">
                <button class="btn-hdr" onclick="saveData()">💾 Save</button>
                <input type="file" id="load-file" style="display:none;" accept=".json" onchange="loadData(event)">
                <button class="btn-hdr" onclick="$('load-file').click()">📂 Load</button>
                <button class="btn-hdr" onclick="exportPDF()">📄 PDF</button>
                <button class="btn-hdr" onclick="exportExcel()">📊 Excel</button>
            </div>
        </div>
    </header>

    <div class="main-layout" id="main-layout">
        <div class="panel no-print" id="config-panel">
            <div class="panel-hdr collapsible" onclick="toggleConfigPanel()" title="Click to expand / collapse">
                <div class="phdr-dot"></div>
                <span class="panel-ttl">Project Configuration</span>
                <span class="collapse-chevron" id="config-chevron">▼</span>
            </div>
            <div class="panel-body">
                <div class="g4" style="margin-bottom:13px;">
                    <div class="fg"><label>Report Title</label><input type="text" id="report-title" placeholder="e.g. Defect Liability Report" oninput="updateReportHeader()"></div>
                    <div class="fg"><label>Project Name</label><input type="text" id="proj-name" placeholder="e.g. Tower B Fit-out" oninput="updateReportHeader()"></div>
                    <div class="fg"><label>Inspection Date</label><input type="date" id="proj-date" oninput="updateReportHeader()"></div>
                    <div class="fg"><label>Project Manager</label><input type="text" id="proj-manager" placeholder="Name" oninput="updateReportHeader()"></div>
                </div>
                <div class="g3">
                    <div class="fg"><label>Snag ID Prefix</label><input type="text" id="report-prefix" value="ADCOOP-SN" oninput="updateReportHeader()"></div>
                    <div class="fg" style="grid-column:span 2; display:none;"><label>Logo Image URL</label><input type="text" id="report-logo" value="" oninput="updateReportHeader()"></div>
                </div>
            </div>
        </div>

        <div class="panel no-print">
            <div class="panel-hdr">
                <div class="phdr-dot" style="background:var(--gold); box-shadow:0 0 7px rgba(154,104,0,0.4);"></div>
                <span class="panel-ttl">Add / Edit Observation</span>
            </div>
            <div class="panel-body">
                <div class="sec-lbl photo-lbl">Photo</div>
                <div id="drop-zone" class="drop-zone">
                    <span class="dz-icon">📷</span>
                    <span class="dz-text">Drag &amp; Drop Photo Here</span>
                    <span class="dz-sub">or choose an upload method</span>
                    <div class="upload-methods">
                        <label class="btn btn-ghost">
                            📸 Camera
                            <input type="file" id="snag-photo-cam" accept="image/*" capture="environment" style="display:none;">
                        </label>
                        <label class="btn btn-ghost">
                            🖼️ Gallery
                            <input type="file" id="snag-photo-gal" accept="image/*" style="display:none;">
                        </label>
                    </div>
                    <input type="file" id="snag-photo" accept="image/*" style="display:none;">
                </div>

                <button class="btn btn-markup" id="btn-markup" style="display:none;margin-bottom:13px;" onclick="showEditor()">✏️ Edit &amp; Markup Photo</button>
                <div id="markup-container">
                    <div id="cropper-stage">
                        <div class="edit-tb">
                            <button class="btn btn-ghost" onclick="rotateImage(-90)">↺ Rotate Left</button>
                            <button class="btn btn-ghost" onclick="rotateImage(90)">↻ Rotate Right</button>
                            <button class="btn btn-success" onclick="applyEditsAndSwitchToDraw()">✅ Apply &amp; Draw</button>
                        </div>
                        <div id="cropper-wrapper"><img id="image-to-edit" alt="Photo being edited"></div>
                    </div>
                    <div id="drawing-stage" style="display:none;">
                        <div class="sec-lbl" style="margin-bottom:7px;">Draw on photo - Red Ink</div>
                        <canvas id="markup-canvas"></canvas>
                        <button class="btn btn-danger" style="margin-top:8px;" onclick="undoDrawing()">↩ Undo Last Stroke</button>
                    </div>
                </div>

                <div class="sec-lbl description-heading">
                    <span>Description</span>
                    <button class="btn btn-ghost" onclick="regenerateComment()" id="btn-regen" title="Use AI to enhance your description">✨ AI Regenerate</button>
                </div>
                <div class="fg desc-wrap">
                    <textarea id="snag-comment" placeholder="Describe the defect and required corrective action... (tap the mic to dictate)"></textarea>
                    <div class="desc-actions" id="desc-actions">
                        <button type="button" onclick="$('snag-photo-cam').click()" title="Take photo" aria-label="Take photo">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h1a2 2 0 0 0 2-2a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1a2 2 0 0 0 2 2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2"/><circle cx="12" cy="13" r="3"/></svg>
                        </button>
                        <button type="button" onclick="$('snag-photo-gal').click()" title="Attach from gallery" aria-label="Attach from gallery">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7l-6.5 6.5a1.5 1.5 0 0 0 3 3L18 10a3 3 0 0 0-6-6l-6.5 6.5a4.5 4.5 0 0 0 9 9L21 13"/></svg>
                        </button>
                    </div>
                    <button type="button" class="btn-mic" id="btn-mic" onclick="toggleDictation()" title="Dictate description" aria-label="Dictate description"></button>
                </div>
                <button class="btn btn-gold btn-full" id="btn-add-snag" onclick="addSnag()">+ Add Observation</button>
            </div>
        </div>

        <div class="filter-bar no-print">
            <label>🔍 Search</label>
            <input type="text" id="filter-text" placeholder="Filter by description..." style="max-width:420px;">
        </div>

        <div id="report-container">
            <div class="rpt-hdr-block">
                <div class="rpt-title sync-rpt-title"></div>
                <div class="divider"></div>
                <div class="rpt-meta-row">
                    <div class="rpt-meta-text">
                        <strong class="sync-proj-name">Project: [Not Set]</strong><br>
                        <span class="sync-proj-mgr">PM: [Not Set]</span><br>
                        <span class="sync-proj-date">Date: [Not Set]</span>
                    </div>
                    <div class="rpt-logo"><img id="display-logo" src="./logo.png" alt="Logo"></div>
                </div>
            </div>
            <div class="dash-wrap" style="margin-bottom:16px;">
                <div class="dash-card">
                    <span class="dash-val" id="dash-total">0</span>
                    <span class="dash-lbl">Total Observations Logged</span>
                </div>
            </div>
            <div class="sec-lbl" style="margin-bottom:12px;">Observation Register</div>
            <div id="snag-list"></div>
        </div>
    </div>

    <script>
        const HARDCODED_COMPANY_LOGO_URL = "./logo.png";
        const IMAGE_MAX = 2000;
        const JPEG_QUALITY = 0.82;
        const UNDO_LIMIT = 8;

        const $ = (id) => document.getElementById(id);
        const isTouchDevice = window.matchMedia('(hover: none), (pointer: coarse)').matches;

        let snagData = [];
        let snagCounter = 1;
        let editingSnagId = null;
        let hasUnsavedChanges = false;
        let currentRawImage = null;
        let cropper = null;
        let isDrawing = false;
        let drawingBaseImage = new Image();
        let undoStack = [];

        const imageToEdit = $('image-to-edit');
        const canvas = $('markup-canvas');
        const ctx = canvas.getContext('2d');

        function debounce(fn, wait = 150) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), wait);
            };
        }

        function markDirty() {
            hasUnsavedChanges = true;
        }

        function findSnagIndex(id) {
            return snagData.findIndex((snag) => snag.id === id);
        }

        function escapeHTML(s) {
            if (!s) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDateForDisplay(rawDate) {
            if (!rawDate) return '';
            const parts = rawDate.split('-');
            return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : rawDate;
        }

        function collectProjectData() {
            return {
                reportTitle: $('report-title').value,
                projName: $('proj-name').value,
                projDate: $('proj-date').value,
                projManager: $('proj-manager').value,
                reportPrefix: $('report-prefix').value,
                snags: snagData,
                counter: snagCounter
            };
        }

        function restoreProjectData(data) {
            $('report-title').value = data.reportTitle || '';
            $('proj-name').value = data.projName || '';
            $('proj-date').value = data.projDate || '';
            $('proj-manager').value = data.projManager || '';
            $('report-prefix').value = data.reportPrefix || 'ADCOOP-SN';
            snagData = Array.isArray(data.snags) ? data.snags : [];
            snagCounter = Number(data.counter) || snagData.length + 1;
            updateReportHeader(false);
            renderSnags();
        }

        window.addEventListener('beforeunload', (e) => {
            if (!hasUnsavedChanges) return;
            e.preventDefault();
            e.returnValue = '';
        });

        function toggleConfigPanel() {
            const panel = $('config-panel');
            panel.classList.toggle('collapsed');
            localStorage.setItem('configCollapsed', panel.classList.contains('collapsed') ? '1' : '0');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            localStorage.setItem('snagTheme', next);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            $('theme-icon').textContent = theme === 'dark' ? '🌙' : '☀️';
            $('theme-label').textContent = theme === 'dark' ? 'Dark' : 'Light';
        }

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;
        let micStoppedByUser = false;

        const MIC_SVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>';
        const STOP_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';

        function setMicState(listening) {
            isListening = listening;
            const micBtn = $('btn-mic');
            micBtn.classList.toggle('listening', listening);
            micBtn.innerHTML = listening ? STOP_SVG : MIC_SVG;
            micBtn.title = listening ? 'Stop dictation' : 'Dictate description';
        }

        function toggleDictation() {
            const ta = $('snag-comment');

            if (!SpeechRec) {
                ta.focus();
                return;
            }

            if (isListening) {
                micStoppedByUser = true;
                recognition.stop();
                return;
            }

            recognition = new SpeechRec();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (e) => {
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) {
                        const transcript = e.results[i][0].transcript.trim();
                        if (!transcript) continue;
                        const needsSpace = ta.value && !/\s$/.test(ta.value);
                        ta.value += (needsSpace ? ' ' : '') + transcript;
                        markDirty();
                    }
                }
            };

            recognition.onend = () => {
                if (!micStoppedByUser && isListening) {
                    try { recognition.start(); return; } catch (err) {}
                }
                micStoppedByUser = false;
                setMicState(false);
            };

            recognition.onerror = (e) => {
                micStoppedByUser = true;
                setMicState(false);
                if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    alert("Microphone access was denied. Please allow microphone permission in your browser settings, or tap the text box and use your keyboard's mic key.");
                    ta.focus();
                }
            };

            try {
                micStoppedByUser = false;
                recognition.start();
                setMicState(true);
            } catch (err) {
                setMicState(false);
                ta.focus();
            }
        }

        const dropZone = $('drop-zone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (!e.dataTransfer.files.length) return;
            $('snag-photo').files = e.dataTransfer.files;
            $('snag-photo').dispatchEvent(new Event('change'));
        });

        const processPhoto = function(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) {
                resetEditorUI();
                return;
            }

            const url = URL.createObjectURL(file);
            const img = new Image();

            img.onload = () => {
                const scale = Math.min(IMAGE_MAX / img.width, IMAGE_MAX / img.height, 1);
                const width = Math.round(img.width * scale);
                const height = Math.round(img.height * scale);

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;

                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.imageSmoothingEnabled = true;
                tempCtx.imageSmoothingQuality = 'high';
                tempCtx.drawImage(img, 0, 0, width, height);

                currentRawImage = tempCanvas.toDataURL('image/jpeg', JPEG_QUALITY);
                URL.revokeObjectURL(url);
                e.target.value = '';
                markDirty();

                if (isTouchDevice) {
                    $('btn-markup').style.display = 'none';
                    showEditor();
                    const editor = $('markup-container');
                    if (editor) window.scrollTo({ top: editor.offsetTop - 75, behavior: 'smooth' });
                } else {
                    $('btn-markup').style.display = 'inline-flex';
                    $('markup-container').style.display = 'none';
                }
            };

            img.onerror = () => {
                URL.revokeObjectURL(url);
                alert("Could not load this image.");
            };

            img.src = url;
        };

        $('snag-photo').addEventListener('change', processPhoto);
        $('snag-photo-cam').addEventListener('change', processPhoto);
        $('snag-photo-gal').addEventListener('change', processPhoto);
        $('filter-text').addEventListener('input', debounce(renderSnags, 150));

        function showEditor() {
            if (!currentRawImage) return;
            $('markup-container').style.display = 'block';
            $('cropper-stage').style.display = 'block';
            $('drawing-stage').style.display = 'none';
            $('btn-markup').style.display = 'none';
            imageToEdit.src = currentRawImage;
            imageToEdit.onload = () => {
                if (cropper) cropper.destroy();
                cropper = new Cropper(imageToEdit, {
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 1,
                    restore: false,
                    guides: false,
                    center: false,
                    highlight: false,
                    cropBoxMovable: true,
                    cropBoxResizable: true,
                    toggleDragModeOnDblclick: false
                });
            };
        }

        function rotateImage(degrees) {
            if (cropper) cropper.rotate(degrees);
        }

        function applyEditsAndSwitchToDraw() {
            if (!cropper) return;
            const edited = cropper.getCroppedCanvas({
                maxWidth: IMAGE_MAX,
                maxHeight: IMAGE_MAX,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high'
            }).toDataURL('image/jpeg', JPEG_QUALITY);

            $('cropper-stage').style.display = 'none';
            $('drawing-stage').style.display = 'block';

            drawingBaseImage.onload = () => {
                canvas.width = drawingBaseImage.width;
                canvas.height = drawingBaseImage.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(drawingBaseImage, 0, 0, canvas.width, canvas.height);
                cropper.destroy();
                cropper = null;
                undoStack = [];
            };
            drawingBaseImage.src = edited;
            markDirty();
        }

        function undoDrawing() {
            if (undoStack.length) {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = undoStack.pop();
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(drawingBaseImage, 0, 0, canvas.width, canvas.height);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const point = e.touches ? e.touches[0] : e;
            return {
                x: (point.clientX - rect.left) * (canvas.width / rect.width),
                y: (point.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e) {
            isDrawing = true;
            if (undoStack.length >= UNDO_LIMIT) undoStack.shift();
            undoStack.push(canvas.toDataURL('image/jpeg', JPEG_QUALITY));
            draw(e);
        }

        function stopDraw() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineWidth = Math.max(5, canvas.width * 0.0125);
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#f04060' : '#c02236';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            markDirty();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseout', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('touchcancel', stopDraw);
        canvas.addEventListener('touchmove', draw, { passive: false });

        function resetEditorUI() {
            currentRawImage = null;
            $('btn-markup').style.display = 'none';
            $('markup-container').style.display = 'none';
            $('snag-photo').value = '';
            $('snag-photo-cam').value = '';
            $('snag-photo-gal').value = '';
            undoStack = [];
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateReportHeader(markChanged = true) {
            const formattedDate = formatDateForDisplay($('proj-date').value);
            const titleValue = $('report-title').value || 'SNAG REPORT';

            document.querySelectorAll('.sync-rpt-title').forEach((el) => { el.innerText = titleValue; });
            document.querySelectorAll('.sync-proj-name').forEach((el) => { el.innerText = 'Project: ' + ($('proj-name').value || '[Not Set]'); });
            document.querySelectorAll('.sync-proj-mgr').forEach((el) => { el.innerText = 'PM: ' + ($('proj-manager').value || '[Not Set]'); });
            document.querySelectorAll('.sync-proj-date').forEach((el) => { el.innerText = 'Date: ' + (formattedDate || '[Not Set]'); });

            const logo = $('display-logo');
            if (logo) logo.src = HARDCODED_COMPANY_LOGO_URL;
            if (markChanged) markDirty();
        }

        function regenerateComment() {
            const commentInput = $('snag-comment');
            const button = $('btn-regen');
            const text = commentInput.value.trim();

            if (!text && !currentRawImage) {
                alert("Please add a basic description or a photo first for the AI to enhance.");
                return;
            }

            button.innerHTML = "⏳ Enhancing...";
            button.disabled = true;

            setTimeout(() => {
                if (!text) {
                    commentInput.value = "Observation: An anomaly has been detected in the uploaded image requiring immediate attention and rectification as per project specifications.";
                } else {
                    const formattedText = text.charAt(0).toUpperCase() + text.slice(1);
                    commentInput.value = `Observation: ${formattedText}\n\nAction Required: The contractor is instructed to review the aforementioned defect and perform necessary rectifications to ensure compliance with approved drawings and FLS standards.`;
                }
                button.innerHTML = "✨ AI Regenerate";
                button.disabled = false;
                markDirty();
            }, 500);
        }

        function addSnag() {
            const commentInput = $('snag-comment');
            const comment = commentInput.value.trim();

            if (!comment && !currentRawImage) {
                alert("Add a description or photo.");
                return;
            }

            if (isListening && recognition) {
                micStoppedByUser = true;
                recognition.stop();
            }

            let image = null;
            if (currentRawImage) {
                const markupVisible = $('markup-container').style.display === 'block';
                const drawingVisible = $('drawing-stage').style.display === 'block';
                image = markupVisible && drawingVisible
                    ? canvas.toDataURL('image/jpeg', JPEG_QUALITY)
                    : currentRawImage;
            }

            if (editingSnagId !== null) {
                const index = findSnagIndex(editingSnagId);
                if (index === -1) {
                    alert("Could not find the observation being edited.");
                    return;
                }
                snagData[index].image = image;
                snagData[index].comment = commentInput.value;
                editingSnagId = null;
                $('btn-add-snag').innerText = '+ Add Observation';
            } else {
                snagData.push({ id: snagCounter++, image, comment: commentInput.value });
            }

            commentInput.value = '';
            resetEditorUI();
            markDirty();
            renderSnags();
        }

        function editSnag(id) {
            const index = findSnagIndex(id);
            if (index === -1) return;

            const snag = snagData[index];
            $('snag-comment').value = snag.comment || '';

            if (snag.image) {
                currentRawImage = snag.image;
                $('btn-markup').style.display = 'inline-flex';
                $('markup-container').style.display = 'none';
            } else {
                resetEditorUI();
            }

            editingSnagId = id;
            $('btn-add-snag').innerText = '💾 Update Observation';
            const panels = document.querySelectorAll('.panel.no-print');
            if (panels[1]) window.scrollTo({ top: panels[1].offsetTop - 75, behavior: 'smooth' });
        }

        function deleteSnag(id) {
            if (!confirm('Remove this observation?')) return;
            const index = findSnagIndex(id);
            if (index === -1) return;
            snagData.splice(index, 1);
            markDirty();
            renderSnags();
        }

        function renderSnags() {
            const list = $('snag-list');
            const prefix = $('report-prefix').value || 'ADCOOP-SN';
            const filterText = $('filter-text').value.toLowerCase();
            const visibleSnags = snagData.filter((snag) => !filterText || (snag.comment || '').toLowerCase().includes(filterText));

            list.innerHTML = visibleSnags.map((snag) => {
                const ref = `${escapeHTML(prefix)}-${String(snag.id).padStart(3, '0')}`;
                const safeComment = escapeHTML(snag.comment || '').replace(/\n/g, '<br>');
                const imageHtml = snag.image
                    ? `<img src="${snag.image}" alt="Observation Photo" class="snag-photo">`
                    : `<div class="no-img">NO IMAGE</div>`;

                return `
                    <div class="snag-item">
                        <div class="snag-photo-wrap">${imageHtml}</div>
                        <div class="snag-body">
                            <div class="snag-top"><span class="snag-ref">${ref}</span></div>
                            <div class="snag-desc">${safeComment || '<em style="color:var(--text-muted)">No description provided.</em>'}</div>
                            <div class="snag-acts no-print">
                                <button class="btn btn-edit" onclick="editSnag(${snag.id})">✏️ Edit</button>
                                <button class="btn btn-danger" onclick="deleteSnag(${snag.id})">🗑 Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (!visibleSnags.length) {
                list.innerHTML = `<div style="text-align:center;padding:38px;color:var(--text-muted);font-family:var(--mono);font-size:.82em;letter-spacing:1px;">NO OBSERVATIONS LOGGED YET</div>`;
            }

            $('dash-total').innerText = snagData.length;
        }

        function saveData() {
            const data = collectProjectData();
            const anchor = document.createElement('a');
            anchor.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            anchor.download = (data.projName || 'project') + '_snags.json';
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            hasUnsavedChanges = false;
            localStorage.removeItem("snagProject");
        }

        function loadData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    restoreProjectData(JSON.parse(e.target.result));
                    hasUnsavedChanges = false;
                    event.target.value = '';
                } catch (err) {
                    alert("Error loading file.");
                }
            };
            reader.readAsText(file);
        }

        async function getLogoBase64() {
            const logoUrl = HARDCODED_COMPANY_LOGO_URL;
            if (!logoUrl) return null;

            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    try {
                        const logoCanvas = document.createElement('canvas');
                        logoCanvas.width = img.width;
                        logoCanvas.height = img.height;
                        logoCanvas.getContext('2d').drawImage(img, 0, 0);
                        resolve(logoCanvas.toDataURL('image/png'));
                    } catch (e) {
                        resolve(logoUrl.startsWith('data:') ? logoUrl : null);
                    }
                };
                img.onerror = () => {
                    resolve(logoUrl.startsWith('data:') ? logoUrl : null);
                };
                img.src = logoUrl;
            });
        }

        async function exportPDF() {
            if (snagData.length === 0) {
                alert("No observations to export. Please add at least one observation.");
                return;
            }

            const titleInput = $('report-title');
            if (!titleInput.value.trim()) {
                const title = prompt("Enter report title:", "");
                if (title === null) return;
                titleInput.value = title.trim();
                updateReportHeader();
            }

            window.scrollTo(0, 0);

            const noPrintElements = Array.from(document.querySelectorAll('.no-print'));
            const previousDisplays = new Map(noPrintElements.map((el) => [el, el.style.display]));
            const container = $('report-container');
            const originalCursor = document.body.style.cursor;
            let originalLogoSrc = null;

            try {
                noPrintElements.forEach((el) => { el.style.display = 'none'; });
                container.classList.add('pdf-export-mode');
                document.body.style.cursor = 'wait';

                const titleToPrint = titleInput.value || 'SNAG REPORT';
                const projectName = $('proj-name').value || '[Not Set]';
                const projectManager = $('proj-manager').value || '[Not Set]';
                const reportDate = formatDateForDisplay($('proj-date').value) || '[Not Set]';

                await new Promise((resolve) => setTimeout(resolve, 200));

                const originalSnagList = container.querySelector('#snag-list');
                const snagItems = Array.from(originalSnagList.querySelectorAll('.snag-item'));
                const logoBase64 = await getLogoBase64();
                const displayLogo = $('display-logo');
                originalLogoSrc = displayLogo ? displayLogo.src : null;
                if (displayLogo && logoBase64) displayLogo.src = logoBase64;

                const pdf = new window.jspdf.jsPDF({ unit: 'pt', format: 'a4', orientation: 'p' });
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                const marginX = 25;
                const itemsPerPage = 4;
                const chunks = [];

                for (let i = 0; i < snagItems.length; i += itemsPerPage) {
                    chunks.push(snagItems.slice(i, i + itemsPerPage));
                }

                originalSnagList.id = 'snag-list-hidden';
                originalSnagList.style.setProperty('display', 'none', 'important');

                const headerBlock = container.querySelector('.rpt-hdr-block');
                const dashboard = container.querySelector('.dash-wrap');
                const sectionLabel = container.querySelector('.sec-lbl');

                for (let i = 0; i < chunks.length; i++) {
                    if (i > 0) {
                        pdf.addPage();
                        if (headerBlock) headerBlock.style.display = 'none';
                        if (dashboard) dashboard.style.display = 'none';
                        if (sectionLabel) sectionLabel.style.display = 'none';
                    }

                    const pageSnagsContainer = document.createElement('div');
                    pageSnagsContainer.style.cssText = 'display:flex; flex-direction:column; width:100%;';

                    chunks[i].forEach((item) => {
                        const clone = item.cloneNode(true);
                        clone.style.marginBottom = '10px';
                        pageSnagsContainer.appendChild(clone);
                    });

                    container.appendChild(pageSnagsContainer);

                    const renderedCanvas = await html2canvas(container, {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: '#ffffff',
                        width: 760,
                        windowWidth: 800
                    });

                    pageSnagsContainer.remove();

                    const imageData = renderedCanvas.toDataURL('image/jpeg', 0.92);
                    const imageProps = pdf.getImageProperties(imageData);
                    const renderWidth = pdfWidth - (marginX * 2);
                    const renderHeight = (imageProps.height * renderWidth) / imageProps.width;
                    let yPos = marginX;

                    if (i > 0) {
                        yPos = 55;
                        pdf.setFontSize(11);
                        pdf.setTextColor(44, 62, 80);
                        pdf.setFont('helvetica', 'bold');
                        pdf.text(titleToPrint.toUpperCase(), marginX, 30);
                        pdf.setFontSize(9);
                        pdf.setFont('helvetica', 'normal');
                        pdf.text(`Project: ${projectName}   |   PM: ${projectManager}   |   Date: ${reportDate}`, marginX, 45);
                        pdf.setDrawColor(212, 196, 168);
                        pdf.setLineWidth(0.5);
                        pdf.line(marginX, 52, pdfWidth - marginX, 52);

                        if (logoBase64) {
                            try {
                                const props = pdf.getImageProperties(logoBase64);
                                const logoHeight = 28;
                                const logoWidth = (props.width * logoHeight) / props.height;
                                const imageType = logoBase64.includes('png') ? 'PNG' : 'JPEG';
                                pdf.addImage(logoBase64, imageType, pdfWidth - marginX - logoWidth, 20, logoWidth, logoHeight);
                            } catch (e) {}
                        }
                    }

                    pdf.addImage(imageData, 'JPEG', marginX, yPos, renderWidth, renderHeight);
                    pdf.setFontSize(10);
                    pdf.setTextColor(100);
                    pdf.setFont('helvetica', 'normal');
                    pdf.text(`Page ${i + 1} of ${chunks.length}`, pdfWidth / 2, pdfHeight - 20, { align: 'center' });
                }

                const filename = (titleInput.value || 'Report').replace(/[^a-z0-9]/gi, '_') + '.pdf';
                pdf.save(filename);
            } catch (err) {
                console.error("PDF Export error:", err);
                alert("An error occurred generating the PDF. See console.");
            } finally {
                document.body.style.cursor = originalCursor;
                if ($('display-logo') && originalLogoSrc) $('display-logo').src = originalLogoSrc;

                const hiddenList = container.querySelector('#snag-list-hidden') || container.querySelector('#snag-list');
                if (hiddenList) {
                    hiddenList.id = 'snag-list';
                    hiddenList.style.removeProperty('display');
                }

                const headerBlock = container.querySelector('.rpt-hdr-block');
                const dashboard = container.querySelector('.dash-wrap');
                const sectionLabel = container.querySelector('.sec-lbl');
                if (headerBlock) headerBlock.style.display = '';
                if (dashboard) dashboard.style.display = '';
                if (sectionLabel) sectionLabel.style.display = '';

                container.classList.remove('pdf-export-mode');
                previousDisplays.forEach((display, el) => { el.style.display = display; });
            }
        }

        async function exportExcel() {
            const titleInput = $('report-title');
            if (!titleInput.value.trim()) {
                const title = prompt("Enter report title:", "");
                if (title === null) return;
                titleInput.value = title.trim();
                updateReportHeader();
            }

            const title = titleInput.value || 'SNAG REPORT';
            const projectName = $('proj-name').value || 'N/A';
            const projectDate = formatDateForDisplay($('proj-date').value) || 'N/A';
            const projectManager = $('proj-manager').value || 'N/A';
            const prefix = $('report-prefix').value || 'ADCOOP-SN';

            const workbook = new ExcelJS.Workbook();
            workbook.creator = 'Report Generator';
            workbook.created = new Date();
            const safeTabName = title.replace(/[\\/*?\[\]]/g, '').substring(0, 31) || 'Observations';
            const worksheet = workbook.addWorksheet(safeTabName, {
                views: [{ state: 'frozen', ySplit: 7 }],
                pageSetup: {
                    paperSize: 9,
                    orientation: 'portrait',
                    fitToPage: true,
                    fitToWidth: 1,
                    fitToHeight: 0,
                    printTitlesRow: '7:7',
                    margins: { left: 0.5, right: 0.5, top: 0.6, bottom: 0.6, header: 0.3, footer: 0.3 }
                }
            });

            const NAVY = 'FF15387A', GOLD = 'FF9A6800', BEIGE = 'FFFDF8F0', CARD = 'FFF7F1E6',
                  TAN = 'FFD4C4A8', INK = 'FF2A1F0E', SEC = 'FF5A4A30';
            const thinBorder = {
                top: { style: 'thin', color: { argb: TAN } },
                bottom: { style: 'thin', color: { argb: TAN } },
                left: { style: 'thin', color: { argb: TAN } },
                right: { style: 'thin', color: { argb: TAN } }
            };

            worksheet.columns = [{ width: 16 }, { width: 30 }, { width: 72 }];

            const titleRow = worksheet.addRow([title.toUpperCase()]);
            worksheet.mergeCells('A1:C1');
            titleRow.height = 34;
            titleRow.getCell(1).style = {
                font: { bold: true, size: 14, color: { argb: 'FFFFFFFF' } },
                fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: NAVY } },
                alignment: { horizontal: 'center', vertical: 'middle' },
                border: { bottom: { style: 'medium', color: { argb: GOLD } } }
            };

            const metaRows = [
                ['Project:', projectName],
                ['Project Manager:', projectManager],
                ['Inspection Date:', projectDate],
                ['Total Observations:', String(snagData.length)]
            ];
            metaRows.forEach((pair) => {
                const r = worksheet.addRow(pair);
                r.height = 18;
                ['A', 'B', 'C'].forEach((col) => {
                    const c = r.getCell(col);
                    c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: BEIGE } };
                });
                r.getCell(1).font = { bold: true, size: 10, color: { argb: SEC } };
                r.getCell(1).alignment = { horizontal: 'left', vertical: 'middle' };
                r.getCell(2).font = { size: 10, color: { argb: INK } };
                r.getCell(2).alignment = { horizontal: 'left', vertical: 'middle' };
            });
            worksheet.getRow(5).getCell(1).border = { bottom: { style: 'thin', color: { argb: TAN } } };
            worksheet.getRow(5).getCell(2).border = { bottom: { style: 'thin', color: { argb: TAN } } };
            worksheet.getRow(5).getCell(3).border = { bottom: { style: 'thin', color: { argb: TAN } } };

            const spacer = worksheet.addRow([]);
            spacer.height = 8;

            const logoBase64DataUrl = await getLogoBase64();
            if (logoBase64DataUrl) {
                try {
                    const base64 = logoBase64DataUrl.split(',')[1];
                    const extension = logoBase64DataUrl.includes('png') ? 'png' : 'jpeg';
                    const imageId = workbook.addImage({ base64, extension });
                    worksheet.addImage(imageId, {
                        tl: { nativeCol: 2, nativeColOff: 3228975, nativeRow: 1, nativeRowOff: 28575 },
                        ext: { width: 160, height: 58 }
                    });
                } catch (e) {}
            }

            const headerRow = worksheet.addRow(["Ref ID", "Photo", "Description"]);
            headerRow.height = 22;
            headerRow.eachCell((cell) => {
                cell.font = { bold: true, size: 10, color: { argb: 'FFFFFFFF' } };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: NAVY } };
                cell.alignment = { horizontal: 'center', vertical: 'middle' };
                cell.border = thinBorder;
            });

            const filterText = $('filter-text').value.toLowerCase();
            let rowNumber = 8;
            let dataIndex = 0;

            snagData.forEach((snag) => {
                if (filterText && !(snag.comment || '').toLowerCase().includes(filterText)) return;
                const ref = `${prefix}-${String(snag.id).padStart(3, '0')}`;
                const row = worksheet.addRow([ref, snag.image ? "" : "NO IMAGE", snag.comment || '']);
                row.height = 120;
                const zebra = dataIndex % 2 === 0 ? 'FFFFFFFF' : CARD;

                row.getCell(1).style = {
                    font: { bold: true, size: 10, color: { argb: GOLD } },
                    fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: zebra } },
                    alignment: { horizontal: 'center', vertical: 'middle' },
                    border: thinBorder
                };
                row.getCell(2).style = {
                    font: { size: 8, italic: true, color: { argb: 'FF9A8868' } },
                    fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: zebra } },
                    alignment: { horizontal: 'center', vertical: 'middle' },
                    border: thinBorder
                };
                row.getCell(3).style = {
                    font: { size: 10, color: { argb: INK } },
                    fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: zebra } },
                    alignment: { horizontal: 'left', vertical: 'middle', wrapText: true, indent: 1 },
                    border: thinBorder
                };

                if (snag.image) {
                    const base64 = snag.image.split(',')[1];
                    const extension = snag.image.includes("png") ? "png" : "jpeg";
                    const imageId = workbook.addImage({ base64, extension });
                    worksheet.addImage(imageId, {
                        tl: { col: 1.08, row: rowNumber - 1 + 0.08 },
                        ext: { width: 190, height: 140 }
                    });
                }
                rowNumber++;
                dataIndex++;
            });

            const footerRow = worksheet.addRow([`Generated ${new Date().toLocaleString('en-GB', { hour12: false })}  |  ${title} — ${projectName}`]);
            worksheet.mergeCells(`A${rowNumber}:C${rowNumber}`);
            footerRow.getCell(1).font = { italic: true, size: 8, color: { argb: 'FF9A8868' } };
            footerRow.getCell(1).alignment = { horizontal: 'right' };

            const buffer = await workbook.xlsx.writeBuffer();
            const blobUrl = URL.createObjectURL(new Blob([buffer], {
                type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            }));
            const anchor = document.createElement('a');
            const cleanPart = (s) => (s || '').replace(/[^a-z0-9]/gi, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
            const dateStamp = $('proj-date').value || new Date().toISOString().slice(0, 10);
            const safeFileName = [cleanPart(title), cleanPart(projectName !== 'N/A' ? projectName : ''), dateStamp]
                .filter(Boolean).join('_') || 'Project_Snags';
            anchor.href = blobUrl;
            anchor.download = safeFileName + ".xlsx";
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        }

        function autoSave() {
            if (!hasUnsavedChanges && snagData.length === 0) return;
            localStorage.setItem("snagProject", JSON.stringify(collectProjectData()));
            hasUnsavedChanges = false;
        }

        setInterval(autoSave, 5000);

        window.onload = function() {
            applyTheme(localStorage.getItem('snagTheme') || 'light');
            $('btn-mic').innerHTML = MIC_SVG;
            if (localStorage.getItem('configCollapsed') === '1') {
                $('config-panel').classList.add('collapsed');
            }
            const saved = localStorage.getItem("snagProject");

            if (saved) {
                if (confirm("Found an unsaved session. Restore it?")) {
                    try {
                        restoreProjectData(JSON.parse(saved));
                    } catch (e) {
                        localStorage.removeItem("snagProject");
                        updateReportHeader(false);
                    }
                } else {
                    localStorage.removeItem("snagProject");
                    updateReportHeader(false);
                    renderSnags();
                }
            } else {
                updateReportHeader(false);
                renderSnags();
            }

            hasUnsavedChanges = false;
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
